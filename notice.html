<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script src="./js/script.js"></script>
    <link rel="stylesheet" href="./style/noticeStyle.css">
</head>
<body>
    <div class="register-container">
    <h2 class="register-title">공지사항 등록</h2>
    <div class="form-group">
        <input type="text" id="noticeTitle" class="register-input" placeholder="제목을 입력하세요." maxlength="100">
        <textarea id="noticeArea" class="register-textarea" placeholder="500자 이내로 입력하세요." maxlength="500"></textarea>
        <div class="btn-group">
            <button id="noticeInsert" class="btn-register">등록</button>
            <button id="cancel" class="btn-cancel">취소</button>
        </div>
    </div>
</div>
</body>
</html>
