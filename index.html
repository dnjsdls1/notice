<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>notice</title>
    <link rel="stylesheet" href="./style/style.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
    <script src="./js/script.js"></script>
</head>
<body>
    <div class="wrapper">
        <div class="header">
            <span id="timeDiv" class="time"></span>
            <header>공지사항</header>
        </div>

        <main class="main">
            <div class="table-wrapper">
                <div class="table-container">
                    <table id="tableDiv" class="notice-table">
                        <thead>
                            <tr>
                                <th id="noticeNo"><span class="text-clickable">No</span></th>
                                <th id="title"><span class="text-clickable">제목</span></th>
                                <th id="userId"><span class="text-clickable">작성자</span></th>
                                <th id="createAt"><span class="text-clickable">등록일</span></th>
                            </tr>
                        </thead>
                        <tbody>
                        </tbody>
                    </table>
                </div>  <!-- table-container -->
                <button id="newNotice" class="btn btn-outline-dark newClickBtn">글 쓰기</button>
            </div> <!-- table-wrapper -->
            <aside class="aside">
                <div id="loginBox" class="login">
                    <div class="login-row">
                        <input id="login-id" class="full-input" type="text" placeholder="ID를 입력해주세요." >
                    </div>
                    <div class="login-row">
                        <input id="login-password" class="full-input" type="password" placeholder="비밀번호를 입력하세요." >
                    </div>
                    <button id="loginBtn" class="btn btn-outline-secondary loginBtn">로그인</button>
                    <div class="login-menu">
                        <label class="label" id="id-search">아이디 찾기</label>
                        <label class="label" id="pwd-search">비밀번호 찾기</label>
                        <label class="label" id="register-btn">회원가입</label>
                    </div>
                </div>
            </aside>
        </main>

        <footer class="footer">
            <div class="notice-footer">
                <p>공지사항 문의는 현재 받고 있지 않습니다.</p>
            </div>
        </footer>
    </div>
</body>
</html>
